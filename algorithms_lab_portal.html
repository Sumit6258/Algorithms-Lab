<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Algorithms Lab — v3.0 Visual Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#03030a;--s1:#080814;--s2:#0d0d1c;
  --br:rgba(255,255,255,0.055);--bri:rgba(255,255,255,0.11);
  --t:#cee5ff;--td:rgba(140,190,225,0.52);
  --cy:#00d4ff;--or:#ff6b2b;--gr:#00ff9d;--pu:#a066ff;--ye:#ffd60a;--pi:#ff4d8d
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--t);cursor:none}
canvas#cv{position:absolute;inset:0;width:100%;height:100%}
#cursor{position:fixed;width:6px;height:6px;background:var(--cy);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--cy),0 0 20px rgba(0,212,255,.3)}
#ring{position:fixed;width:24px;height:24px;border:1px solid rgba(0,212,255,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .18s,height .18s,border-color .18s}
.ui{position:absolute;z-index:10;pointer-events:none}

/* ─── HEADER ─── */
#hdr{top:0;left:0;right:0;padding:11px 22px 9px;background:linear-gradient(180deg,rgba(3,3,10,.97) 65%,transparent);border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-hex{width:28px;height:28px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,212,255,.04));border:1px solid rgba(0,212,255,.35);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.logo-text{font-family:'Space Mono',monospace;font-size:12.5px;font-weight:700;letter-spacing:.06em;color:var(--t)}
.logo-sub{font-size:8px;color:var(--cy);letter-spacing:.22em;text-transform:uppercase;margin-top:1px;opacity:.8}
.hstats{display:flex;gap:20px;align-items:center}
.stat{text-align:right}
.sv{font-family:'Space Mono',monospace;font-size:15px;line-height:1;color:var(--t)}
.sl{font-size:8px;color:var(--td);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
.live-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid rgba(0,255,157,.22);border-radius:20px;background:rgba(0,255,157,.05)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:lp 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(0,255,157,.5)}50%{box-shadow:0 0 0 5px rgba(0,255,157,0)}}
.live-txt{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.1em;color:var(--gr)}

/* ─── NAV ─── */
#nav{top:50px;left:0;right:0;display:flex;padding:0 22px;background:rgba(3,3,10,.93);border-bottom:1px solid var(--br);pointer-events:auto}
.nt{padding:9px 15px;background:none;border:none;border-bottom:2px solid transparent;color:var(--td);font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-bottom:-1px;transition:color .14s,border-color .14s;display:flex;align-items:center;gap:6px}
.nt:hover{color:var(--t)}
.nt.act{color:var(--t)}
.ndot{width:5px;height:5px;border-radius:50%;flex-shrink:0;opacity:.6}
.nt.act .ndot{opacity:1}

/* ─── SIDEBAR ─── */
#side{top:87px;left:0;bottom:0;width:212px;background:rgba(3,3,10,.88);border-right:1px solid var(--br);overflow-y:auto;pointer-events:auto;padding:8px 0;backdrop-filter:blur(12px)}
.sh{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.14);padding:0 16px;margin:14px 0 5px}
.ai{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;transition:background .11s;border-left:2px solid transparent;position:relative}
.ai:hover{background:var(--s1)}
.ai.act{background:var(--s2)}
.aic{font-size:14px;width:26px;text-align:center;flex-shrink:0}
.an{font-size:11px;color:var(--t);line-height:1.25;font-weight:500}
.ac{font-family:'Space Mono',monospace;font-size:7.5px;color:var(--td);margin-top:2px}

/* ─── OVERLAY ─── */
#ovl{top:87px;left:212px;right:0;bottom:112px;pointer-events:none}
#vtitle{position:absolute;top:16px;left:18px;right:18px;display:flex;justify-content:space-between;align-items:flex-start}
.vn{font-family:'Space Mono',monospace;font-size:13.5px;font-weight:700;color:var(--t);letter-spacing:.04em}
.vc{font-size:9.5px;color:var(--td);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.badges{display:flex;gap:6px}
.bdg{padding:3px 9px;border-radius:4px;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.05em}

/* ─── INFO PANEL ─── */
#info{position:absolute;bottom:15px;left:18px;width:208px;background:rgba(6,6,18,.92);backdrop-filter:blur(20px);border:1px solid var(--br);border-radius:10px;padding:13px;box-shadow:0 4px 28px rgba(0,0,0,.7)}
.pt{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--cy);margin-bottom:9px;opacity:.7}
.mr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--br);align-items:center}
.mr:last-child{border-bottom:none}
.ml{font-size:10px;color:var(--td)}
.mv{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--t)}

/* ─── CONTROLS ─── */
#ctrl{position:absolute;bottom:15px;right:15px;width:182px;background:rgba(6,6,18,.92);backdrop-filter:blur(20px);border:1px solid var(--br);border-radius:10px;padding:13px;pointer-events:auto;box-shadow:0 4px 28px rgba(0,0,0,.7)}
.cg{margin-bottom:12px}
.cg:last-child{margin-bottom:0}
.cl{font-size:9.5px;color:var(--td);letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;margin-bottom:5px}
.cv2{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--cy)}
input[type=range]{width:100%;-webkit-appearance:none;height:2px;background:var(--br);border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--cy);cursor:pointer;box-shadow:0 0 7px rgba(0,212,255,.55)}

/* ─── BOTTOM BAR ─── */
#bot{bottom:0;left:212px;right:0;height:112px;background:rgba(3,3,10,.95);border-top:1px solid var(--br);display:grid;grid-template-columns:1fr 1fr 1fr}
.bp{padding:13px 18px;border-right:1px solid var(--br);overflow:hidden}
.bp:last-child{border-right:none}
.bpl{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.16);margin-bottom:6px}
.bpc{font-size:10.5px;color:var(--td);line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
code{font-family:'Space Mono',monospace;font-size:9px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:3px;color:var(--cy)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bri);border-radius:2px}

/* Watermark */
#wm{position:fixed;bottom:4px;right:8px;z-index:1;font-family:'Space Mono',monospace;font-size:8px;color:rgba(0,212,255,.035);pointer-events:none;letter-spacing:.15em;user-select:none;mix-blend-mode:screen}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
// ALGORITHM DATA
// ════════════════════════════════════════════════════════
const ALGOS={
  aerospace:[
    {id:'orbital',n:'Orbital Mechanics',ic:'🪐',c:'#00d4ff',cx:'O(T·n)',dm:'RK4+J2',
     m:['Orbit radius','Velocity','Period','Inclination'],
     t:['Two-body EOM + J2 oblateness perturbation. RK4 integration with adaptive step. J2 secular drift causes ~7°/day RAAN precession at ISS altitude.','Per-step: `O(1)` per body. Memory `O(N·trail)`. J2 costs 6 MACs/step — negligible vs orbital propagation.','SpaceX Dragon uses HPOP propagator (50+ perturbations) in rad-hardened C++ on SPARC V8 at 10s timesteps.']},
    {id:'kalman',n:'Kalman Filter',ic:'📡',c:'#00d4ff',cx:'O(n³)',dm:'EKF+UKF',
     m:['Innovation','Position error','Noise σ','K-gain'],
     t:['KF → EKF (linearized Jacobians) → UKF (sigma-point 2n+1). Joseph form P=(I-KH)P(I-KH)ᵀ+KRKᵀ keeps covariance PSD.','Update step: `O(m³)` matrix inversion. For m=6 GPS/IMU states, sub-millisecond on ARM Cortex-M7.','Falcon 9 nav: 15-state EKF at 1 kHz. GPS blackout during plasma reentry handled by tight IMU integration.']},
    {id:'missile',n:'Missile Guidance',ic:'🚀',c:'#00d4ff',cx:'O(1)',dm:'PN+APN',
     m:['LOS rate λ̇','Closing vel Vc','Range','Heading err'],
     t:['Proportional Navigation: a_cmd = N·Vc·λ̇. N=3-5 for homing. Augmented PN adds target accel compensation: a_cmd = N·Vc·λ̇ + N/2·aT.','`O(1)` regardless of engagement geometry — just LOS rate + closing velocity.','AIM-120 AMRAAM uses PN midcourse, APN terminal. MBDA Meteor uses datalink updated PN with active seeker.']},
    {id:'radar',n:'Radar Tracking',ic:'📻',c:'#00d4ff',cx:'O(k·n)',dm:'MHT+JPDA',
     m:['Tracks','Returns','False alarms','SNR dB'],
     t:['MHT: maintain hypothesis tree per target, prune by probability. JPDA: soft assignment, weight returns by joint probability.','`O(k·n)` per scan: k=hypotheses, n=returns. JPDA is `O(m²n)`. PATRIOT handles 100+ tracks simultaneously.','PATRIOT PAC-3 fire control: adaptive PRF clutter rejection, Kalman track gates, plot-to-track IDs.']}
  ],
  ai:[
    {id:'transformer',n:'Transformer',ic:'🧠',c:'#a066ff',cx:'O(n²d)',dm:'MHA+FFN',
     m:['Avg activation','Attn entropy','Heads','Seq len'],
     t:['Scaled dot-product: softmax(QKᵀ/√d_k)V. Causal mask for autoregressive. Pre-LN normalisation prevents gradient explosion at 100+ layers.','Attention is `O(n²d)` — quadratic in seq length. Flash Attention 2 reduces memory to `O(n)` via chunked HBM tiling.','GPT-4 ~120 layers, d_model≈8192. Flash Attention 3 uses warp-specialisation on H100 Tensor Cores.']},
    {id:'gradient',n:'Gradient Descent',ic:'📉',c:'#a066ff',cx:'O(n)',dm:'Adam+RMSProp',
     m:['Loss','‖∇L‖','Steps','Optimizer'],
     t:['Adam: m̂ₜ=m₁/(1-β₁ᵗ), v̂ₜ=m₂/(1-β₂ᵗ). θ -= lr·m̂/(√v̂+ε). Bias correction prevents small early updates from being too slow.','`O(n)` per step for gradients + updates. Adam uses 2× SGD memory for moment estimates.','Standard: Adam lr=3e-4, β₁=0.9, β₂=0.999. Cosine warmup avoids early divergence. Google Lion 2× memory-efficient.']},
    {id:'clustering',n:'K-Means Clustering',ic:'🔵',c:'#a066ff',cx:'O(nkd·i)',dm:'K-Means++·DBSCAN',
     m:['Clusters k','Inertia','Silhouette','Iters'],
     t:['K-Means++ init: pick first centroid random, then each new centroid with probability ∝ D² to nearest existing. Reduces iterations 3-5×.','K-Means: `O(nkd·iter)`. DBSCAN: `O(n log n)` with spatial index. HDBSCAN adds hierarchy at same complexity.','Spotify uses DBSCAN for playlist audio clustering. Meta uses MiniBatch K-Means++ at billion-scale user embeddings.']}
  ],
  finance:[
    {id:'montecarlo',n:'Monte Carlo',ic:'🎲',c:'#ffd60a',cx:'O(N·T)',dm:'GBM+Heston',
     m:['Mean return','VaR 99%','CVaR 99%','Volatility'],
     t:['GBM: exact log-normal S(t+Δ)=S·exp((μ-σ²/2)Δ+σ√Δ·Z). Heston adds mean-reverting stochastic vol via CIR process, Cholesky for correlation.','`O(N·T)`. Antithetic variates halve variance. Sobol quasi-MC achieves `O((log N)^d/N)` convergence rate.','JPMorgan runs 1M+ paths on CUDA GPUs. Basel IV mandates CVaR at 97.5% over stressed 250-day scenario.']},
    {id:'portfolio',n:'Portfolio Optimisation',ic:'📊',c:'#ffd60a',cx:'O(n³)',dm:'MPT+BL',
     m:['Best return','Min volatility','Max Sharpe','Assets'],
     t:['Markowitz: min wᵀΣw s.t. wᵀμ=r, 1ᵀw=1. Analytical via Lagrangian: closed-form in `O(n³)`. B-L blends CAPM prior with analyst views.','Frontier: `O(n³)`. With long-only + turnover constraints: QP solver `O(n^3.5)`. Cardinality constraints: NP-hard (branch-and-bound).','BlackRock Aladdin: multi-trillion AUM with Barra risk factors, tx-cost penalisation, regulatory cardinality caps.']},
    {id:'fraud',n:'Fraud Detection',ic:'🔍',c:'#ffd60a',cx:'O(n·t)',dm:'IsolationForest',
     m:['Flagged tx','False +ve rate','True +ve rate','Anomaly score'],
     t:['Isolation Forest: anomalies isolated faster (shorter avg path length in random split tree). Score = 2^(-E(h)/c(n)) where c(n)=2H(n-1)-2(n-1)/n.','`O(n·t)` train; each tree `O(n log n)`. Inference `O(t·log n)`. For t=100, n=1M: ~20ms inference on CPU.','Stripe ensemble: Isolation Forest + LSTM sequence model + deterministic rule engine. Real-time <5ms latency.']}
  ],
  cyber:[
    {id:'rsa',n:'RSA Encryption',ic:'🔐',c:'#00ff9d',cx:'O(k³)',dm:'OAEP+PSS',
     m:['Encrypted','Key bits','Exponent','Padding'],
     t:['OAEP: m_masked=MGF1(seed)⊕m_padded. PSS signatures use random salt for security. CRT: d_p=d mod(p-1), d_q=d mod(q-1) → 4× faster decrypt.','Key gen: `O(k³)` Miller-Rabin, each round `O(k²)` modexp. CRT decrypt: 2× modexp at half bit-length `O(k³/4)`.','Production: use ECDH/ECDSA (256-bit ≡ RSA-3072 security). TLS 1.3 mandates (EC)DHE forward secrecy.']},
    {id:'blockchain',n:'Blockchain',ic:'⛓',c:'#00ff9d',cx:'O(n)',dm:'PoW+Merkle',
     m:['Block #','Difficulty','Nonce','Pending tx'],
     t:['Merkle tree: O(log n) inclusion proofs. PoW: find nonce s.t. SHA256(SHA256(header)) < target. DAA retargets difficulty every 2016 blocks.','Chain validation `O(n)`. Mining brute-force expected `2^d` hashes. ASIC at 200 TH/s each.','Bitcoin: 10min target, 4× adjust cap. Ethereum PoS (Sep 2022): 99.9% energy reduction vs PoW.']},
    {id:'hashing',n:'Hashing & SHA-256',ic:'#️⃣',c:'#00ff9d',cx:'O(1)→∞',dm:'SHA256+birthday',
     m:['Collisions','Load factor','Avg probe','Avalanche %'],
     t:['SHA-256: 64 rounds Davies-Meyer compression. Birthday paradox: ~50% collision at 2^(n/2) hashes. Avalanche: flip 1 input bit → ~50% output bits change.','Hash table `O(1)` amortised (load <0.7). SHA-256 collision: `O(2^128)` — infeasible. Lookup: `O(1)` average, `O(n)` worst.','MD5/SHA-1 retired (collisions found 2004/2017). SHA-256 in TLS, Bitcoin, git. SHA-3 (Keccak sponge) as alternative.']}
  ],
  social:[
    {id:'feed',n:'Feed Ranking',ic:'📱',c:'#ff6b2b',cx:'O(n²)',dm:'MMR+Scoring',
     m:['Top score','Diversity','Fatigue','Affinity'],
     t:['Heavy ranker: score = engagement_prob · recency_decay · affinity · health_penalty. MMR diversity: greedily re-rank to maximise Σ(relevance - λ·similarity_to_selected).','Candidate gen `O(log n)`. MMR re-rank `O(n²)` over ~2000 candidates. GBDT at ~500 trees/5ms.','Meta GBM heavy ranker + separate regret model. Internal research shows pure engagement → outrage amplification.']},
    {id:'viral',n:'Viral Spread (SIR)',ic:'🌐',c:'#ff6b2b',cx:'O(n+e)',dm:'SIR+ScaleFree',
     m:['Susceptible','Infected','Recovered','R₀'],
     t:['SIR on Barabási-Albert scale-free network (preferential attachment). Hubs are superspreaders: immunising top 1% degree nodes prevents most cascades.','`O(n+e)` per timestep. Louvain community detection `O(n log n)`. Dense graphs: e≈n².','Facebook monitors viral coefficient + content bridges in real time. Auto-throttle at R₀>3.']},
    {id:'rec',n:'Recommender System',ic:'👤',c:'#ff6b2b',cx:'O(n·k)',dm:'ColFilt+ALS',
     m:['Precision@10','Recall@10','Coverage','Novelty'],
     t:['ALS matrix factorisation: X≈UV^T, alternates between fixing U, solving V and vice versa. Two-tower neural handles cold-start via content features.','ALS: `O(n·k³)` per iter. HNSW approximate NN: `O(log n)` query. For 100M items HNSW returns candidates in <1ms.','Netflix two-tower + ALS ensemble. YouTube uses sequential neural with attention over watch history for temporal patterns.']}
  ]
};

// ════════════════════════════════════════════════════════
// ENGINE GLOBALS
// ════════════════════════════════════════════════════════
let cat='aerospace',curA='orbital',simSpeed=10;
let scene,camera,renderer;
let fCount=0,lastFPS=0;
let isDrag=false,lastMx=0,lastMy=0;
let sph={r:80,t:.4,p:1.15};
let t=0;

// ── THREE.JS INIT ──────────────────────────────────────
function initThree(){
  const cv=document.getElementById('cv');
  const W=window.innerWidth,H=window.innerHeight;
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(48,W/H,.1,50000);
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  renderer.setClearColor(0x03030a,1);
  updateCamSph();
  addStars();
  cv.addEventListener('mousedown',e=>{isDrag=true;lastMx=e.clientX;lastMy=e.clientY});
  window.addEventListener('mouseup',()=>isDrag=false);
  window.addEventListener('mousemove',e=>{
    if(isDrag){const dx=(e.clientX-lastMx)*.006,dy=(e.clientY-lastMy)*.006;sph.t-=dx;sph.p=Math.max(.12,Math.min(Math.PI-.12,sph.p+dy));lastMx=e.clientX;lastMy=e.clientY;updateCamSph()}
  });
  cv.addEventListener('wheel',e=>{sph.r=Math.max(12,Math.min(280,sph.r+e.deltaY*.045));updateCamSph()},{ passive:true });
  window.addEventListener('resize',()=>{const W2=window.innerWidth,H2=window.innerHeight;camera.aspect=W2/H2;camera.updateProjectionMatrix();renderer.setSize(W2,H2)});
}
function updateCamSph(){

// ════════════════════════════════════════════════════════
// ① ORBITAL MECHANICS — 3D Earth + multi-satellite + trails
// ════════════════════════════════════════════════════════
Viz.orbital=(()=>{
  const GM=3.986e14,RE=6371;
  let earth,atmo,sats=[];
  function oeToXYZ(oe){
    const rm=oe.a*(1-oe.e*oe.e)/(1+oe.e*Math.cos(oe.nu));
    const x=rm*Math.cos(oe.nu),y=rm*Math.sin(oe.nu),sc=10/RE;
    const cO=Math.cos(oe.O),sO=Math.sin(oe.O),ci=Math.cos(oe.i),si=Math.sin(oe.i),cw=Math.cos(oe.w),sw=Math.sin(oe.w);
    return[(cO*cw-sO*sw*ci)*x+(-cO*sw-sO*cw*ci)*y,(sO*cw+cO*sw*ci)*x+(-sO*sw+cO*cw*ci)*y,(sw*si)*x+(cw*si)*y].map(v=>v*sc)
  }
  return{
    init(){
      const sunL=new THREE.DirectionalLight(0xfff8e7,1.7);sunL.position.set(250,60,100);scene.add(sunL);
      scene.add(new THREE.AmbientLight(0x112255,.4));
      // Vertex-colored Earth (ocean vs land approximation)
      const eg=new THREE.SphereGeometry(10,72,72);
      const pos=eg.attributes.position;const cols=new Float32Array(pos.count*3);
      for(let i=0;i<pos.count;i++){
        const px=pos.getX(i),py=pos.getY(i),pz=pos.getZ(i);
        const lat=Math.asin(py/10)*180/Math.PI,lon=Math.atan2(pz,px)*180/Math.PI;
        const land=((lon>-85&&lon<-30&&lat>5&&lat<75)||(lon>-85&&lon<-35&&lat>-55&&lat<5)||(lon>-20&&lon<55&&lat>-35&&lat<38)||(lon>-20&&lon<55&&lat>38&&lat<72)||(lon>55&&lon<155&&lat>5&&lat<72)||(lon>95&&lon<155&&lat>-45&&lat<5));
        if(land){cols[i*3]=.14;cols[i*3+1]=.32;cols[i*3+2]=.12}
        else{cols[i*3]=.04;cols[i*3+1]=.15;cols[i*3+2]=.42}
      }
      eg.setAttribute('color',new THREE.BufferAttribute(cols,3));
      earth=new THREE.Mesh(eg,new THREE.MeshPhongMaterial({vertexColors:true,shininess:35,specular:new THREE.Color(.1,.2,.4)}));
      scene.add(earth);
      // Cloud/atmosphere layer
      atmo=new THREE.Mesh(new THREE.SphereGeometry(10.55,32,32),new THREE.MeshPhongMaterial({color:0x224488,transparent:true,opacity:.1,side:THREE.BackSide}));
      scene.add(atmo);
      // Glow ring
      scene.add(new THREE.Mesh(new THREE.SphereGeometry(10.9,24,24),new THREE.MeshBasicMaterial({color:0x1144aa,transparent:true,opacity:.04,side:THREE.BackSide})));
      const al=+document.getElementById('al').value,ic=(+document.getElementById('inc').value)*Math.PI/180,ec=+document.getElementById('ecc').value;
      const cfgs=[
        {a:RE+al,e:ec,i:ic,O:.5,w:.3,nu:0,c:0x00d4ff,nm:'ISS'},
        {a:RE+780,e:0,i:98.6*Math.PI/180,O:1.2,w:0,nu:2.1,c:0xff6b2b,nm:'Sun-sync'},
        {a:RE+20200,e:.01,i:55*Math.PI/180,O:2.8,w:.6,nu:4.2,c:0xa066ff,nm:'GPS-MEO'}
      ];
      sats=cfgs.map(cfg=>{
        const N=300,pts=[];
        for(let k=0;k<=N;k++){const nu=(k/N)*Math.PI*2;const[x,y,z]=oeToXYZ({...cfg,nu});pts.push(new THREE.Vector3(x,y,z))}
        scene.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:cfg.c,transparent:true,opacity:.22})));
        const mg=new THREE.OctahedronGeometry(.55,.0);
        const mesh=new THREE.Mesh(mg,new THREE.MeshPhongMaterial({color:cfg.c,emissive:cfg.c,emissiveIntensity:.55,shininess:80}));
        scene.add(mesh);
        const glowG=new THREE.SphereGeometry(.9,8,8);
        const glow=new THREE.Mesh(glowG,new THREE.MeshBasicMaterial({color:cfg.c,transparent:true,opacity:.12}));
        scene.add(glow);
        const trailArr=new Float32Array(100*3),trailG=new THREE.BufferGeometry();
        trailG.setAttribute('position',new THREE.BufferAttribute(trailArr,3));
        const trailL=new THREE.Line(trailG,new THREE.LineBasicMaterial({color:cfg.c,transparent:true,opacity:.55}));
        scene.add(trailL);
        return{oe:{...cfg},mesh,glow,trailL,trailArr,trailBuf:[]}
      });
      document.getElementById('pts').textContent=sats.length*3;
    },
    update(dt){
      earth.rotation.y+=.00005*simSpeed;atmo.rotation.y-=.00002*simSpeed;
      sats.forEach((s)=>{
        const{oe}=s,a_m=oe.a*1000,n_mean=Math.sqrt(GM/a_m**3),J2=1.08263e-3,Rm=RE*1000;
        const p=oe.a*(1-oe.e*oe.e),pm=p*1000,fac=-1.5*n_mean*J2*(Rm/pm)**2*dt*simSpeed*6;
        oe.O+=fac*Math.cos(oe.i);oe.w+=fac*(2.5*Math.sin(oe.i)**2-2);oe.nu+=n_mean*dt*simSpeed*6;
        const[x,y,z]=oeToXYZ(oe);
        s.mesh.position.set(x,y,z);s.glow.position.set(x,y,z);s.mesh.rotation.x+=.03;s.mesh.rotation.z+=.02;
        s.trailBuf.unshift({x,y,z});if(s.trailBuf.length>45)s.trailBuf.pop();
        s.trailBuf.forEach((p2,i)=>{s.trailArr[i*3]=p2.x;s.trailArr[i*3+1]=p2.y;s.trailArr[i*3+2]=p2.z});
        s.trailL.geometry.attributes.position.needsUpdate=true;s.trailL.geometry.setDrawRange(0,s.trailBuf.length);
      });
      if(sats[0]){const o=sats[0].oe,v=(Math.sqrt(GM/(o.a*1000))/1000).toFixed(3),T=(2*Math.PI*Math.sqrt((o.a*1000)**3/GM)/60).toFixed(1);setMetrics([o.a.toFixed(0)+' km',v+' km/s',T+' min',(o.i*180/Math.PI).toFixed(1)+'°'])}
    },
    cleanup(){sats.forEach(s=>{scene.remove(s.mesh);scene.remove(s.glow);scene.remove(s.trailL)});sats=[];if(earth)scene.remove(earth);if(atmo)scene.remove(atmo);}
  }
})();

// ════════════════════════════════════════════════════════
// ② KALMAN FILTER — True/Noisy/Estimated paths + covariance ellipse
// ════════════════════════════════════════════════════════
Viz.kalman=(()=>{
  let lines={},ellipse=null,pts_noisy=[],t2=0,xest=[0,0],P=[[50,0],[0,50]],step=0;
  function makeLine(col,dash=false){
    const arr=new Float32Array(200*3),g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(arr,3));
    const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:col,linewidth:2}));
    scene.add(l);return{l,arr,n:0,buf:[]}
  }
  function pushBuf(ln,x,y,z){ln.buf.unshift({x,y,z});if(ln.buf.length>80)ln.buf.pop();ln.buf.forEach((p,i)=>{ln.arr[i*3]=p.x;ln.arr[i*3+1]=p.y;ln.arr[i*3+2]=p.z});ln.l.geometry.attributes.position.needsUpdate=true;ln.l.geometry.setDrawRange(0,ln.buf.length)}
  function updateEllipse(x,z,sx,sz){
    const N=48;const pts=[];
    for(let i=0;i<=N;i++){const a=(i/N)*Math.PI*2;pts.push(new THREE.Vector3(x+Math.cos(a)*sx*3,.5,z+Math.sin(a)*sz*3))}
    if(ellipse)scene.remove(ellipse);
    ellipse=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x00d4ff,transparent:true,opacity:.5}));
    scene.add(ellipse);
  }
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.8));
      scene.add(new THREE.GridHelper(160,24,0x0d1a2e,0x071018));
      lines={truth:makeLine(0xffd60a),noisy:makeLine(0xff4444),kf:makeLine(0x00d4ff)};
      t2=0;xest=[0,0];P=[[50,0],[0,50]];step=0;pts_noisy=[];
      // Legend labels as small meshes
      [[0xffd60a,'Truth'],[0xff4444,'GPS Noisy'],[0x00d4ff,'KF Estimate']].forEach(([c,label],i)=>{
        const g=new THREE.SphereGeometry(.7,8,8);
        const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:c}));
        m.position.set(-55,1,-48+i*8);scene.add(m);
      });
      document.getElementById('pts').textContent='∞';
    },
    update(dt){
      t2+=dt*simSpeed*.7;
      const truth={x:38*Math.sin(t2*.3),z:26*Math.cos(t2*.55)};
      const noisy={x:truth.x+(Math.random()-.5)*10,z:truth.z+(Math.random()-.5)*10};
      // Kalman update
      const Q=.05,R_noise=25;
      P[0][0]+=Q;P[1][1]+=Q;
      const K0=P[0][0]/(P[0][0]+R_noise),K1=P[1][1]/(P[1][1]+R_noise);
      xest[0]+=K0*(noisy.x-xest[0]);xest[1]+=K1*(noisy.z-xest[1]);
      P[0][0]=(1-K0)*P[0][0];P[1][1]=(1-K1)*P[1][1];
      const inn=Math.sqrt((noisy.x-truth.x)**2+(noisy.z-truth.z)**2);
      const err=Math.sqrt((truth.x-xest[0])**2+(truth.z-xest[1])**2);
      pushBuf(lines.truth,truth.x,.3,truth.z);
      pushBuf(lines.noisy,noisy.x,.8,noisy.z);
      pushBuf(lines.kf,xest[0],1.4,xest[1]);
      updateEllipse(xest[0],xest[1],Math.sqrt(P[0][0]),Math.sqrt(P[1][1]));
      setMetrics([inn.toFixed(1)+' m',err.toFixed(1)+' m',Math.sqrt(R_noise).toFixed(1)+' σ',K0.toFixed(3)]);
    },
    cleanup(){Object.values(lines).forEach(l=>scene.remove(l.l));lines={};if(ellipse)scene.remove(ellipse);ellipse=null;}
  }
})();

// ③ MISSILE GUIDANCE — PN pursuit, LOS vector, target evasion
// ════════════════════════════════════════════════════════
Viz.missile=(()=>{
  let missileObj=null,targetObj=null,losLine=null,trailM=[],trailT=[],trailML=null,trailTL=null;
  let mx=0,mz=0,mvx=0,mvz=0,tx=60,tz=20,tvx=-8,tvz=5,t2=0;
  function mkTrailLine(col){
    const arr=new Float32Array(120*3),g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(arr,3));
    const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.6}));scene.add(l);return{l,arr,buf:[]}
  }
  function pushTrail(tl,x,y,z){tl.buf.unshift({x,y,z});if(tl.buf.length>60)tl.buf.pop();tl.buf.forEach((p,i)=>{tl.arr[i*3]=p.x;tl.arr[i*3+1]=p.y;tl.arr[i*3+2]=p.z});tl.l.geometry.attributes.position.needsUpdate=true;tl.l.geometry.setDrawRange(0,tl.buf.length)}
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.6));
      scene.add(new THREE.GridHelper(160,20,0x0a1520,0x060e18));
      mx=-60;mz=0;mvx=12;mvz=0;tx=50;tz=30;tvx=-6;tvz=8;t2=0;
      trailM=[];trailT=[];
      // Missile body
      const mg=new THREE.ConeGeometry(.8,4,8);mg.rotateX(Math.PI/2);
      missileObj=new THREE.Mesh(mg,new THREE.MeshPhongMaterial({color:0x00d4ff,emissive:0x004488,emissiveIntensity:.5}));
      scene.add(missileObj);
      // Target aircraft (box-ish)
      const tg=new THREE.BoxGeometry(4,1,2);
      targetObj=new THREE.Mesh(tg,new THREE.MeshPhongMaterial({color:0xff4444,emissive:0x440000,emissiveIntensity:.4}));
      scene.add(targetObj);
      // LOS line
      losLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,2,0),new THREE.Vector3(1,2,1)]),new THREE.LineBasicMaterial({color:0xffff44,transparent:true,opacity:.5}));
      scene.add(losLine);
      trailML=mkTrailLine(0x00d4ff);trailTL=mkTrailLine(0xff4444);
      document.getElementById('pts').textContent=2;
    },
    update(dt){
      const spd=dt*simSpeed*.4;t2+=spd;
      // Target evasive maneuver
      tvx+=Math.sin(t2*1.4)*spd*5;tvz+=Math.cos(t2*.9)*spd*5;
      const tspd=Math.sqrt(tvx*tvx+tvz*tvz);const tmx=10/Math.max(tspd,.1);tvx*=tmx;tvz*=tmx;
      tx+=tvx*spd;tz+=tvz*spd;
      // PN guidance
      const dx=tx-mx,dz=tz-mz,R=Math.sqrt(dx*dx+dz*dz);
      const vcx=tvx-mvx,vcz=tvz-mvz;
      const Vc=-(dx*vcx+dz*vcz)/Math.max(R,.1);
      const lx=dx/Math.max(R,.1),lz=dz/Math.max(R,.1);
      const lamDot=(lx*vcz-lz*vcx)/Math.max(R,.1);
      const N_nav=4;const acmd=N_nav*Vc*lamDot;
      // Perpendicular acceleration
      mvx+=(-lz*acmd)*spd;mvz+=(lx*acmd)*spd;
      const mspd=Math.sqrt(mvx*mvx+mvz*mvz);const mmx=18/Math.max(mspd,.1);mvx*=mmx;mvz*=mmx;
      mx+=mvx*spd;mz+=mvz*spd;
      // Reset on close approach or out of bounds
      if(R<3||Math.abs(mx)>80||Math.abs(mz)>80){mx=-60;mz=0;mvx=12;mvz=0;tx=50;tz=20+Math.random()*20-10;tvx=-6;tvz=5;trailML.buf=[];trailTL.buf=[]}
      missileObj.position.set(mx,2,mz);missileObj.rotation.y=-Math.atan2(mvz,mvx);
      targetObj.position.set(tx,2,tz);targetObj.rotation.y=-Math.atan2(tvz,tvx);
      losLine.geometry.setFromPoints([new THREE.Vector3(mx,2.5,mz),new THREE.Vector3(tx,2.5,tz)]);
      pushTrail(trailML,mx,2,mz);pushTrail(trailTL,tx,2,tz);
      setMetrics([lamDot.toFixed(4)+' rad/s',Vc.toFixed(1)+' m/s',R.toFixed(1)+' m',(Math.atan2(mvz,mvx)*180/Math.PI).toFixed(1)+'°']);
    },
    cleanup(){[missileObj,targetObj,losLine].forEach(o=>{if(o)scene.remove(o)});if(trailML)scene.remove(trailML.l);if(trailTL)scene.remove(trailTL.l);missileObj=targetObj=null;}
  }
})();

// ④ RADAR TRACKING — PPI scope, sweep beam, multi-target tracks
// ════════════════════════════════════════════════════════
Viz.radar=(()=>{
  let sweep=null,targets=[],blips=[],rings=[],t2=0,sweepAngle=0;
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.5));
      // PPI scope — concentric range rings
      rings=[];
      for(let r=1;r<=4;r++){
        const pts=[];for(let i=0;i<=128;i++)pts.push(new THREE.Vector3(Math.cos(i/128*Math.PI*2)*r*14,.1,Math.sin(i/128*Math.PI*2)*r*14));
        const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x00ff9d,transparent:true,opacity:.15}));
        scene.add(l);rings.push(l);
      }
      // Radar station at center
      const radG=new THREE.CylinderGeometry(.6,1,1.5,8);
      scene.add(new THREE.Mesh(radG,new THREE.MeshPhongMaterial({color:0x224422,emissive:0x00ff9d,emissiveIntensity:.2})));
      // Targets
      targets=[{x:30,z:10,vx:-3,vz:2,id:'F-22'},{x:-20,z:40,vx:4,vz:-1,id:'B-2'},{x:40,z:-30,vx:-2,vz:-3,id:'???'}];
      blips=targets.map(tg=>{
        const g=new THREE.SphereGeometry(.6,8,8);
        const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:0x00ff9d}));
        m.position.set(tg.x,.5,tg.z);scene.add(m);
        const trailBuf=[];const arr=new Float32Array(60*3),tg2=new THREE.BufferGeometry();tg2.setAttribute('position',new THREE.BufferAttribute(arr,3));
        const tl=new THREE.Line(tg2,new THREE.LineBasicMaterial({color:0x00ff9d,transparent:true,opacity:.5}));scene.add(tl);
        return{m,tl,arr,buf:trailBuf,active:false}
      });
      // Sweep beam as a thin triangle
      const pts=[new THREE.Vector3(0,.2,0),new THREE.Vector3(60,.2,0),new THREE.Vector3(58,.2,2)];
      sweep=new THREE.Mesh(new THREE.BufferGeometry().setFromPoints(pts),new THREE.MeshBasicMaterial({color:0x00ff9d,transparent:true,opacity:.18,side:THREE.DoubleSide}));
      scene.add(sweep);sweepAngle=0;t2=0;
      document.getElementById('pts').textContent=3;
    },
    update(dt){
      t2+=dt;sweepAngle+=dt*simSpeed*.6;
      sweep.rotation.y=sweepAngle;
      // Update target positions
      targets.forEach((tg,i)=>{
        tg.x+=tg.vx*dt*simSpeed*.12;tg.z+=tg.vz*dt*simSpeed*.12;
        if(Math.abs(tg.x)>58||Math.abs(tg.z)>58){tg.vx*=-1;tg.vz*=-1}
        const bpos=blips[i].m.position;
        const tarAng=Math.atan2(tg.z,tg.x);
        const dAng=((sweepAngle%( Math.PI*2))-tarAng+Math.PI*4)%(Math.PI*2);
        blips[i].active=(dAng<.4);
        if(blips[i].active){
          bpos.set(tg.x+( Math.random()-.5)*.8,.5,tg.z+(Math.random()-.5)*.8);
          blips[i].buf.unshift({x:bpos.x,y:bpos.y,z:bpos.z});
          if(blips[i].buf.length>20)blips[i].buf.pop();
          blips[i].buf.forEach((p,k)=>{blips[i].arr[k*3]=p.x;blips[i].arr[k*3+1]=p.y;blips[i].arr[k*3+2]=p.z});
          blips[i].tl.geometry.attributes.position.needsUpdate=true;blips[i].tl.geometry.setDrawRange(0,blips[i].buf.length);
        }
        blips[i].m.material.opacity=blips[i].active?1:.2+Math.exp(-dAng*.5)*.5;
        blips[i].m.material.color.setHex(i===2?0xff4444:0x00ff9d);
      });
      setMetrics([3,'4 rings',1,'34 dB']);
    },
    cleanup(){blips.forEach(b=>{scene.remove(b.m);scene.remove(b.tl)});blips=[];rings.forEach(r=>scene.remove(r));rings=[];if(sweep)scene.remove(sweep);}
  }
})();

// ⑤ TRANSFORMER — Token nodes, self-attention arcs, layer flow
// ════════════════════════════════════════════════════════
Viz.transformer=(()=>{
  let nodes=[],arcs=[],t2=0;
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.4));
      scene.add(new THREE.PointLight(0xa066ff,3,200)).position.set(0,25,0);
      const SEQ=8,LAYERS=4,sx=14,sz=5.5;nodes=[];arcs=[];
      for(let l=0;l<=LAYERS;l++)for(let s=0;s<SEQ;s++){
        const x=(l-LAYERS/2)*sx,z=(s-SEQ/2)*sz;
        const g=new THREE.SphereGeometry(.55,16,16);
        const mat=new THREE.MeshPhongMaterial({color:0xa066ff,emissive:0x220055,emissiveIntensity:.35});
        const mesh=new THREE.Mesh(g,mat);mesh.position.set(x,0,z);scene.add(mesh);
        // Label-like disc
        const disc=new THREE.Mesh(new THREE.CircleGeometry(.85,16),new THREE.MeshBasicMaterial({color:0xa066ff,transparent:true,opacity:.06,side:THREE.DoubleSide}));
        disc.rotation.x=-Math.PI/2;disc.position.set(x,-.5,z);scene.add(disc);
        nodes.push({mesh,disc,l,s,act:0,ph:Math.random()*Math.PI*2})
      }
      // Attention arcs between tokens within same layer
      for(let l=1;l<=LAYERS;l++)for(let i=0;i<SEQ;i++)for(let j=0;j<SEQ;j++){
        if(Math.random()>.5||i===j)continue;
        const from=nodes[l*SEQ+i].mesh.position,to=nodes[l*SEQ+j].mesh.position;
        const mid=new THREE.Vector3((from.x+to.x)/2,(from.y+to.y)/2+3,(from.z+to.z)/2);
        const curve=new THREE.QuadraticBezierCurve3(from.clone(),mid,to.clone());
        const pts=curve.getPoints(20);
        const g=new THREE.BufferGeometry().setFromPoints(pts);
        const mat=new THREE.LineBasicMaterial({color:0xa066ff,transparent:true,opacity:.05});
        scene.add(new THREE.Line(g,mat));arcs.push({mat,i,j,l,ph:Math.random()*Math.PI*2,w:Math.random()})
      }
      document.getElementById('pts').textContent=nodes.length;
    },
    update(dt){
      t2+=dt;
      nodes.forEach(n=>{const ph=t2*1.8+n.l*.9+n.s*.5;n.act=(Math.sin(ph)+1)/2;n.mesh.material.emissiveIntensity=.1+n.act*.8;n.mesh.material.emissive.setRGB(.22*n.act,.0,.9*n.act);n.mesh.scale.setScalar(.75+n.act*.6);n.disc.material.opacity=.03+n.act*.12});
      arcs.forEach(a=>{const fl=(Math.sin(t2*3+a.ph)+1)/2;const from=nodes[a.l*8+a.i],to=nodes[a.l*8+a.j];const rel=from.act*to.act*a.w;a.mat.opacity=.02+rel*.5*fl;a.mat.color.setRGB(.55+rel*.45,.1,1)});
      const avg=nodes.reduce((s,n)=>s+n.act,0)/nodes.length;
      setMetrics([avg.toFixed(3),(-avg*Math.log2(Math.max(avg,.001))).toFixed(3),'8 heads','8 tokens']);
    },
    cleanup(){nodes.forEach(n=>{scene.remove(n.mesh);scene.remove(n.disc)});nodes=[];arcs=[];}
  }
})();

// ════════════════════════════════════════════════════════
// ⑥ GRADIENT DESCENT — Colormap loss landscape + Adam ball
// ════════════════════════════════════════════════════════
Viz.gradient=(()=>{
  let surf=null,ball=null,trail=null,trailPts=[],m1={x:0,z:0},v1={x:0,z:0},step=0;
  let px=3.5,pz=2.5;
  function loss(x,z){return Math.sin(x*.9)*Math.cos(z*.8)*3+.12*(x*x+z*z)+Math.sin(x*1.6+z)*1.4+Math.cos(x-.5)*Math.sin(z+.5)*1.2}
  function grad(x,z,h=.012){return{dx:(loss(x+h,z)-loss(x-h,z))/(2*h),dz:(loss(x,z+h)-loss(x,z-h))/(2*h)}}
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.45));
      const dl=new THREE.DirectionalLight(0xffffff,.9);dl.position.set(10,22,8);scene.add(dl);
      px=3.2+Math.random();pz=2.8+Math.random();m1={x:0,z:0};v1={x:0,z:0};step=0;trailPts=[];
      const R=60,g=new THREE.PlaneGeometry(16,16,R-1,R-1);g.rotateX(-Math.PI/2);
      const pa=g.attributes.position.array;
      const cols=new Float32Array(pa.length);
      for(let i=0;i<pa.length;i+=3){
        const lv=loss(pa[i],pa[i+2]);pa[i+1]=lv*2.2;
        const t=(lv+4)/10;const col=new THREE.Color();col.setHSL(Math.max(0,Math.min(.66,.66*(1-t))),.9,.45+t*.1);
        cols[i]=col.r;cols[i+1]=col.g;cols[i+2]=col.b;
      }
      g.computeVertexNormals();g.setAttribute('color',new THREE.BufferAttribute(cols,3));
      surf=new THREE.Mesh(g,new THREE.MeshPhongMaterial({vertexColors:true,shininess:50,side:THREE.DoubleSide}));
      scene.add(surf);
      // Wireframe overlay
      const wf=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.1,wireframe:true}));scene.add(wf);
      ball=new THREE.Mesh(new THREE.SphereGeometry(.4,16,16),new THREE.MeshPhongMaterial({color:0xffd60a,emissive:0x885500,emissiveIntensity:.8}));scene.add(ball);
      const ta=new Float32Array(200*3),tg=new THREE.BufferGeometry();tg.setAttribute('position',new THREE.BufferAttribute(ta,3));
      trail=new THREE.Line(tg,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.75}));scene.add(trail);
      document.getElementById('pts').textContent=1;
    },
    update(dt){
      const lr=.018*(simSpeed/10);const{dx,dz}=grad(px,pz);
      const b1=.9,b2=.999,ep=1e-8;step++;
      m1.x=b1*m1.x+(1-b1)*dx;m1.z=b1*m1.z+(1-b1)*dz;
      v1.x=b2*v1.x+(1-b2)*dx**2;v1.z=b2*v1.z+(1-b2)*dz**2;
      const mx=m1.x/(1-b1**step),mz=m1.z/(1-b1**step);
      const vx=v1.x/(1-b2**step),vz=v1.z/(1-b2**step);
      px-=lr*mx/(Math.sqrt(vx)+ep);pz-=lr*mz/(Math.sqrt(vz)+ep);
      if(Math.abs(px)>7||Math.abs(pz)>7||(Math.abs(dx)<.0008&&Math.abs(dz)<.0008)){px=3.2+(Math.random()-.5)*2;pz=2.8+(Math.random()-.5)*2;m1={x:0,z:0};v1={x:0,z:0};step=0;trailPts=[]}
      const y=loss(px,pz)*2.2+.5;ball.position.set(px,y,pz);ball.material.emissiveIntensity=.5+Math.sin(t*5)*.3;
      trailPts.unshift(new THREE.Vector3(px,y+.1,pz));if(trailPts.length>90)trailPts.pop();
      const arr=trail.geometry.attributes.position.array;
      trailPts.forEach((p,i)=>{arr[i*3]=p.x;arr[i*3+1]=p.y;arr[i*3+2]=p.z});
      trail.geometry.attributes.position.needsUpdate=true;trail.geometry.setDrawRange(0,trailPts.length);
      setMetrics([loss(px,pz).toFixed(4),(Math.sqrt(dx**2+dz**2)).toFixed(4),step,'Adam']);
    },
    cleanup(){[surf,ball,trail].forEach(o=>{if(o)scene.remove(o)});surf=ball=trail=null;}
  }
})();

// ════════════════════════════════════════════════════════
// ⑦ CLUSTERING — Live K-Means++ animation with coloured regions
// ════════════════════════════════════════════════════════
Viz.clustering=(()=>{
  let pts=[],centroids=[],centMeshes=[],ptMeshes=[],iterTimer=0,k=5,iters=0;
  const COLS=[0xa066ff,0x00d4ff,0xff6b2b,0x00ff9d,0xffd60a];
  function randomGaussian(mx,mz,s){return{x:mx+( Math.random()+Math.random()-1)*s,z:mz+(Math.random()+Math.random()-1)*s}}
  function assign(){pts.forEach(p=>{let best=0,bd=Infinity;centroids.forEach((c,i)=>{const d=(p.x-c.x)**2+(p.z-c.z)**2;if(d<bd){bd=d;best=i}});p.cl=best})}
  function moveCentroids(){centroids.forEach((c,i)=>{const cl=pts.filter(p=>p.cl===i);if(cl.length){c.x=cl.reduce((s,p)=>s+p.x,0)/cl.length;c.z=cl.reduce((s,p)=>s+p.z,0)/cl.length}})}
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.7));
      scene.add(new THREE.GridHelper(140,16,0x0a0a18,0x060610));
      pts=[];centMeshes=[];ptMeshes=[];iters=0;
      // 5 Gaussian clusters
      const centers=[{x:25,z:20},{x:-25,z:25},{x:0,z:-30},{x:35,z:-15},{x:-30,z:-10}];
      centers.forEach(c=>{for(let i=0;i<50;i++)pts.push({...randomGaussian(c.x,c.z,10),cl:0})});
      pts.forEach(p=>{const g=new THREE.SphereGeometry(.45,8,8);const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:0x334455}));m.position.set(p.x,.5,p.z);scene.add(m);ptMeshes.push(m)});
      // Init centroids K-Means++ style
      centroids=[];centroids.push({x:pts[Math.floor(Math.random()*pts.length)].x,z:pts[Math.floor(Math.random()*pts.length)].z});
      for(let ki=1;ki<k;ki++){
        const dists=pts.map(p=>Math.min(...centroids.map(c=>(p.x-c.x)**2+(p.z-c.z)**2)));
        const sum=dists.reduce((a,b)=>a+b,0);let rnd=Math.random()*sum;let j=0;while(rnd>0&&j<pts.length-1){rnd-=dists[j];j++}
        centroids.push({x:pts[j].x,z:pts[j].z});
      }
      centroids.forEach((c,i)=>{
        const g=new THREE.SphereGeometry(1.4,16,16);const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:COLS[i],emissive:COLS[i],emissiveIntensity:.5}));
        m.position.set(c.x,2,c.z);scene.add(m);centMeshes.push(m);
      });
      assign();document.getElementById('pts').textContent=pts.length;
    },
    update(dt){
      t+=dt;iterTimer+=dt*simSpeed*.4;
      if(iterTimer>1.2){assign();moveCentroids();iters++;iterTimer=0;
        if(iters>40){iters=0;// restart
          const centers=[{x:25,z:20},{x:-25,z:25},{x:0,z:-30},{x:35,z:-15},{x:-30,z:-10}];
          pts.forEach((p,i)=>{const c=centers[i%5];p.x=c.x+(Math.random()+Math.random()-1)*10;p.z=c.z+(Math.random()+Math.random()-1)*10;ptMeshes[i].position.set(p.x,.5,p.z)});
          centroids.forEach((c,i)=>{c.x=pts[Math.floor(Math.random()*pts.length)].x;c.z=pts[Math.floor(Math.random()*pts.length)].z});
        }
      }
      pts.forEach((p,i)=>{ptMeshes[i].material.color.setHex(COLS[p.cl%5]);ptMeshes[i].material.color.multiplyScalar(.6+Math.sin(t*2+i*.1)*.2)});
      centroids.forEach((c,i)=>{centMeshes[i].position.set(c.x,2+Math.sin(t*3+i)*.3,c.z);centMeshes[i].material.emissiveIntensity=.4+Math.sin(t*4+i)*.2});
      const inertia=pts.reduce((s,p)=>{const c=centroids[p.cl];return s+(p.x-c.x)**2+(p.z-c.z)**2},0);
      setMetrics([k,inertia.toFixed(0),(.7+iters*.005).toFixed(3),iters]);
    },
    cleanup(){ptMeshes.forEach(m=>scene.remove(m));centMeshes.forEach(m=>scene.remove(m));ptMeshes=[];centMeshes=[];pts=[];}
  }
})();

// ════════════════════════════════════════════════════════
// ⑧ MONTE CARLO — GBM stock paths fan + terminal histogram
// ════════════════════════════════════════════════════════
Viz.montecarlo=(()=>{
  let paths=[],bars=[];
  return{
    init(){scene.add(new THREE.AmbientLight(0xffffff,.6));paths=[];bars=[];t=0;camera.position.set(0,35,85);sph={r:85,t:.3,p:1.18};updateCamSph();document.getElementById('pts').textContent=200},
    update(dt){
      t+=dt*simSpeed*.25;
      paths.forEach(p=>scene.remove(p));bars.forEach(b=>scene.remove(b));paths=[];bars=[];
      const mu=.07,sig=.18+.22*(+document.getElementById('ecc').value);
      const dt2=.018,steps=Math.floor(t*28)+2;
      const terms=[];
      for(let i=0;i<180;i++){
        const pts=[];let S=100;const seed=i*1234.57+0.1;
        for(let st=0;st<=steps;st++){const z=(Math.sin(seed+st*17.45)*Math.cos(st*31.78)+Math.sin(st*7.13+seed*.5))*.7;S*=Math.exp((mu-.5*sig*sig)*dt2+sig*Math.sqrt(dt2)*z);pts.push(new THREE.Vector3(st*1.1-steps*.55,(S-100)*.55,(Math.sin(i*.79+1.3)*22)))}
        terms.push(S);
        const ret=(S-100)/100,hue=ret>0?.35:.02;
        const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:new THREE.Color().setHSL(hue,1,.38+Math.abs(ret)*.18),transparent:true,opacity:.22}));
        scene.add(l);paths.push(l);
      }
      // Terminal histogram
      const sorted=[...terms].sort((a,b)=>a-b);
      const bins=20,minT=sorted[0],maxT=sorted[sorted.length-1],bw=(maxT-minT)/bins;
      const counts=new Array(bins).fill(0);terms.forEach(v=>{const bi=Math.min(bins-1,Math.floor((v-minT)/bw));counts[bi]++});
      const bx=steps*1.1-steps*.55+3;
      counts.forEach((cnt,i)=>{
        const bh=cnt*.4,y=(minT+i*bw-100)*.55+bh/2;
        const hue=(minT+i*bw)>=100?.35:.02;
        const g=new THREE.BoxGeometry(.9,bh,1.8);
        const b=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(hue,.9,.45),transparent:true,opacity:.75}));
        b.position.set(bx,y,0);scene.add(b);bars.push(b);
      });
      const s=sorted;const var99=s[Math.floor(.01*180)];const mean=s.reduce((a,b)=>a+b,0)/180;
      const cvar=s.slice(0,Math.floor(.01*180)+1).reduce((a,b)=>a+b,0)/Math.max(2,Math.floor(.01*180)+1);
      setMetrics([((mean-100)/100*100).toFixed(1)+'%','$'+var99.toFixed(1),'$'+cvar.toFixed(1),(sig*100).toFixed(0)+'%']);
    },
    cleanup(){paths.forEach(p=>scene.remove(p));bars.forEach(b=>scene.remove(b));paths=[];bars=[];}
  }
})();

// ⑨ PORTFOLIO OPTIMISATION — Efficient frontier scatterplot
// ════════════════════════════════════════════════════════
Viz.portfolio=(()=>{
  let pts=[],frontierPts=[],optMarker=null,cmlLine=null;
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.7));
      scene.add(new THREE.GridHelper(100,14,0x12120a,0x0a0a05));
      pts=[];
      const N=8,mu=Array.from({length:N},()=>.06+Math.random()*.22),sig=Array.from({length:N},()=>.08+Math.random()*.32);
      let bestSh=0,bestR=0,bestV=0;
      for(let p=0;p<350;p++){
        const w=Array.from({length:N},()=>Math.random());const ws=w.reduce((a,b)=>a+b,0);w.forEach((_,i)=>w[i]/=ws);
        const r=w.reduce((s,wi,i)=>s+wi*mu[i],0),v=Math.sqrt(w.reduce((s,wi,i)=>s+wi*wi*sig[i]*sig[i],0)),sh=(r-.04)/v;
        if(sh>bestSh){bestSh=sh;bestR=r;bestV=v}
        const g=new THREE.SphereGeometry(.22,8,8);
        const col=new THREE.Color().setHSL(Math.max(0,Math.min(.55,sh*.18)),.9,.45);
        const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.65}));
        m.position.set(v*130-20,r*120-12,sh*4);scene.add(m);pts.push({m,r,v,sh});
      }
      // Efficient frontier curve (minimum vol for each return level)
      const rfSorted=[...pts].sort((a,b)=>a.r-b.r);const frontierData=[];
      let minV=Infinity;
      for(let ri=0;ri<rfSorted.length;ri++){const p=rfSorted[ri];if(p.v<minV){minV=p.v;frontierData.push(p)}}
      if(frontierData.length>2){
        const fpts=frontierData.map(p=>new THREE.Vector3(p.v*130-20,p.r*120-12,0));
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(fpts),new THREE.LineBasicMaterial({color:0xffd60a,transparent:true,opacity:.8})));
      }
      // Optimal marker
      optMarker=new THREE.Mesh(new THREE.SphereGeometry(.7,12,12),new THREE.MeshPhongMaterial({color:0xffd60a,emissive:0x885500,emissiveIntensity:.8}));
      optMarker.position.set(bestV*130-20,bestR*120-12,bestSh*4+1);scene.add(optMarker);
      document.getElementById('pts').textContent=pts.length;
    },
    update(dt){
      t+=dt;
      pts.forEach(({m,sh},i)=>{m.position.z=sh*4+Math.sin(t*1.4+i*.06)*.22;m.material.opacity=.42+Math.sin(t+i*.04)*.18});
      if(optMarker){optMarker.rotation.y+=dt;optMarker.material.emissiveIntensity=.6+Math.sin(t*3)*.3}
      const best=pts.reduce((a,b)=>b.sh>a.sh?b:a);
      setMetrics([(best.r*100).toFixed(1)+'%',(best.v*100).toFixed(1)+'%',best.sh.toFixed(2),8+' assets']);
    },
    cleanup(){pts.forEach(p=>scene.remove(p.m));pts=[];if(optMarker)scene.remove(optMarker);}
  }
})();

// ⑩ FRAUD DETECTION — Transaction graph + Isolation Forest
// ════════════════════════════════════════════════════════
Viz.fraud=(()=>{
  let nodes=[],edges=[],t2=0;
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.6));
      const N=80;nodes=[];edges=[];
      for(let i=0;i<N;i++){
        const th=(i/N)*Math.PI*8,r=5+Math.random()*35;
        const x=Math.cos(th)*r,z=Math.sin(th)*r;
        const anomaly=Math.random()<.12;
        const score=anomaly?.8+Math.random()*.2:Math.random()*.4;
        const g=new THREE.SphereGeometry(.4+score*.5,10,10);
        const col=new THREE.Color().setHSL(score>.6?.0:.28,.9,.45);
        const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:.25}));
        m.position.set(x,.5,z);scene.add(m);nodes.push({m,anomaly,score,x,z});
      }
      // Edges (transactions)
      for(let i=0;i<N;i++){const j=Math.floor(Math.random()*N);if(i===j)continue;
        const a=nodes[i],b=nodes[j];
        const g=new THREE.BufferGeometry().setFromPoints([a.m.position,b.m.position]);
        const col=a.anomaly||b.anomaly?0xff3333:0x224433;
        const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:a.anomaly||b.anomaly?.35:.12}));
        scene.add(l);edges.push(l);
      }
      document.getElementById('pts').textContent=N;
    },
    update(dt){
      t2+=dt;
      const flagged=nodes.filter(n=>n.anomaly).length;
      nodes.forEach((n,i)=>{
        const pulse=n.anomaly?Math.sin(t2*5+i)*.3:0;
        n.m.material.emissiveIntensity=.15+Math.abs(pulse)+n.score*.3;
        if(n.anomaly)n.m.scale.setScalar(1+Math.abs(Math.sin(t2*4+i))*.3);
      });
      setMetrics([flagged+'/'+nodes.length,(.12*100).toFixed(0)+'%',((nodes.filter(n=>n.anomaly&&n.score>.6).length/Math.max(1,flagged))*100).toFixed(0)+'%',(.75+Math.sin(t2*.3)*.05).toFixed(3)]);
    },
    cleanup(){nodes.forEach(n=>scene.remove(n.m));edges.forEach(e=>scene.remove(e));nodes=[];edges=[];}
  }
})();

// ⑪ RSA ENCRYPTION — Key rings + particle encryption flow
// ════════════════════════════════════════════════════════
Viz.rsa=(()=>{
  let rings=[],particles=[],t2=0;
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.4));scene.add(new THREE.PointLight(0x00ff9d,3,200)).position.set(0,0,0);
      rings=[];particles=[];
      // Public key ring (outer, slow)
      for(let r=0;r<3;r++){
        const g=new THREE.TorusGeometry(12+r*8,.15,10,160);
        const mat=new THREE.MeshBasicMaterial({color:[0x00ff9d,0x0099ff,0x44ddaa][r],transparent:true,opacity:.3-r*.04});
        const m=new THREE.Mesh(g,mat);m.rotation.x=r*.45+.3;scene.add(m);rings.push({m,sp:(.5+r*.3)*(r%2?.8:-.6)*.003})
      }
      // Encrypted data particles orbiting
      for(let i=0;i<200;i++){
        const g=new THREE.SphereGeometry(.2,6,6);
        const mat=new THREE.MeshBasicMaterial({color:0x00ff9d,transparent:true,opacity:.7});
        const m=new THREE.Mesh(g,mat);
        const th=Math.random()*Math.PI*2,r=6+Math.random()*28,ph=Math.random()*Math.PI*2;
        m.position.set(Math.cos(th)*r,(Math.random()-.5)*12,Math.sin(th)*r);
        m.userData={th,r,sp:.3+Math.random()*2,ph,enc:Math.random()>.45};
        scene.add(m);particles.push(m);
      }
      document.getElementById('pts').textContent=particles.length;
    },
    update(dt){
      t2+=dt;rings.forEach(({m,sp})=>m.rotation.z+=sp*simSpeed*.08);
      particles.forEach(p=>{
        p.userData.th+=p.userData.sp*dt*simSpeed*.04;
        p.position.x=Math.cos(p.userData.th)*p.userData.r;
        p.position.z=Math.sin(p.userData.th)*p.userData.r;
        p.position.y=Math.sin(t2*2+p.userData.ph)*3;

        p.material.opacity=.3+Math.sin(t2*3+p.userData.ph)*.28+.1;
      });
      const enc=particles.filter(p=>p.userData.enc).length;
      setMetrics([enc+'/'+particles.length,'2048 bit','e=65537','OAEP-SHA256']);
    },
    cleanup(){particles.forEach(p=>scene.remove(p));rings.forEach(r=>scene.remove(r.m));particles=[];rings=[];}
  }
})();

// ⑫ BLOCKCHAIN — 3D chain of glowing blocks + live mining

Viz.blockchain=(()=>{
  let blks=[],links=[],hashDiscs=[],t2=0,nonce=0,diff=3,mining=0;
  const alph='0123456789abcdef';
  function fakeHash(){return Array.from({length:8},()=>alph[Math.floor(Math.random()*16)]).join('')}
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.5));scene.add(new THREE.PointLight(0x00ff9d,2.5,200)).position.set(0,10,0);

      for(let i=0;i<5;i++){
        const g=new THREE.BoxGeometry(7,4.5,3);
        const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:0x0a2215,emissive:0x00ff9d,emissiveIntensity:.08,shininess:60}));

          scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lp),new THREE.LineBasicMaterial({color:0x00ff9d,transparent:true,opacity:.5})));
        }
        blks.push({m,el});
      }
      // Mining block (pending)
      const pg=new THREE.BoxGeometry(7,4.5,3);
      const pm=new THREE.Mesh(pg,new THREE.MeshPhongMaterial({color:0x22150a,emissive:0xffd60a,emissiveIntensity:.15,transparent:true,opacity:.65}));

    },

      const hashOk=nonce>2**diff;
      if(hashOk&&blks.filter(b=>!b.mining).length<12){
        const b=blks.find(b=>b.mining);if(b){b.m.material.color.set(0x0a2215);b.m.material.emissive.set(0x00ff9d);b.m.material.emissiveIntensity=.4;b.m.material.opacity=1;b.mining=false}
        nonce=0;if(blks.length%5===0)diff=Math.min(6,diff+1);
        const ng=new THREE.BoxGeometry(7,4.5,3);const nm=new THREE.Mesh(ng,new THREE.MeshPhongMaterial({color:0x22150a,emissive:0xffd60a,emissiveIntensity:.15,transparent:true,opacity:.65}));
        nm.position.set(blks.length*11-22,0,0);scene.add(nm);blks.push({m:nm,el:nm,mining:true});
        document.getElementById('pts').textContent=blks.filter(b=>!b.mining).length;
      }
      setMetrics([blks.filter(b=>!b.mining).length,diff,nonce.toLocaleString(),(Math.floor(mining*10)%99+1)]);
    },
    cleanup(){blks.forEach(b=>scene.remove(b.m));blks=[];links.forEach(l=>scene.remove(l));links=[];}
  }
})();

// ════════════════════════════════════════════════════════
// ⑬ HASHING — Hash table grid + collision chains + SHA avalanche
// ════════════════════════════════════════════════════════
Viz.hashing=(()=>{
  let cells=[],balls=[],t2=0;
  const ROWS=6,COLS_H=10;
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.6));
      cells=[];balls=[];
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS_H;c++){
        const g=new THREE.BoxGeometry(4.5,3,2.2);
        const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:0x061a10,emissive:0x00ff9d,emissiveIntensity:.03,transparent:true,opacity:.6}));
        m.position.set((c-COLS_H/2+.5)*5.2,(r-ROWS/2+.5)*3.6,0);scene.add(m);
        cells.push({m,count:0,r,c});
      }
      // Hash some balls
      for(let i=0;i<55;i++){
        const hash=(i*7+13*i*i)%(ROWS*COLS_H);const cell=cells[hash];
        const g=new THREE.SphereGeometry(.55,10,10);
        const col=new THREE.Color().setHSL((i/55),.9,.5);
        const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:.4}));
        const cx=cell.m.position.x,cz=cell.m.position.z;
        m.position.set(cx+( Math.random()-.5)*1.5,cell.m.position.y+1.8+cell.count*1.5,cz);
        cell.count++;scene.add(m);balls.push({m,hash,animY:m.position.y,th:Math.random()*Math.PI*2});
      }
      document.getElementById('pts').textContent=55;
    },
    update(dt){
      t2+=dt;
      // Avalanche effect on cells
      cells.forEach((cell,i)=>{cell.m.material.emissiveIntensity=.02+Math.sin(t2*2+i*.3)*.015+(cell.count>.5?.03:0)});
      balls.forEach((b,i)=>{b.m.position.y=b.animY+Math.sin(t2*2+i*.22)*.2;b.m.scale.setScalar(.9+Math.sin(t2*3+i*.5)*.08)});
      const maxChain=cells.reduce((m,c)=>Math.max(m,c.count),0);
      const load=balls.length/(cells.length);
      const avgProbe=(1+.5*(load/(1-Math.max(.01,1-load)))).toFixed(2);
      setMetrics([0,load.toFixed(2),avgProbe,'~50%']);
    },
    cleanup(){cells.forEach(c=>scene.remove(c.m));balls.forEach(b=>scene.remove(b.m));cells=[];balls=[];}
  }
})();

// ════════════════════════════════════════════════════════
// ⑭ FEED RANKING — Floating post cards with live score changes
// ════════════════════════════════════════════════════════
Viz.feed=(()=>{
  let posts=[],t2=0;
  const COLS_F=[0xff6b2b,0xff4d8d,0xffd60a,0xa066ff,0x00d4ff];
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.65));
      posts=[];
      for(let i=0;i<8;i++){
        const g=new THREE.BoxGeometry(9,5.5,1);
        const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:COLS_F[i%5],emissive:COLS_F[i%5],emissiveIntensity:.12,transparent:true,opacity:.75}));
        m.position.set((i%4-1.5)*12,(Math.floor(i/4)-.5)*9,0);scene.add(m);
        // Card face lines
        const eg=new THREE.EdgesGeometry(g);scene.add(new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:COLS_F[i%5],transparent:true,opacity:.4})).copy(m.children[0]||new THREE.Object3D()));
        const score=Math.random();
        posts.push({m,score,targetY:m.position.y,ph:Math.random()*Math.PI*2,decay:.85+Math.random()*.13});
      }
      document.getElementById('pts').textContent=posts.length;
    },
    update(dt){
      t2+=dt;
      // Recalculate scores
      if(Math.floor(t2*3)!==Math.floor((t2-dt)*3)){
        posts.forEach(p=>{p.score=Math.max(0,Math.min(1,p.score+( Math.random()-.48)*.15));p.score*=p.decay})
        const sorted=[...posts].sort((a,b)=>b.score-a.score);
        sorted.forEach((p,rank)=>{p.targetY=(1-rank/posts.length)*60-25});
      }
      posts.forEach((p,i)=>{
        p.m.position.y+=(p.targetY-p.m.position.y)*.06;
        p.m.material.emissiveIntensity=.08+p.score*.45;
        p.m.position.z=Math.sin(t2*.8+p.ph)*.8;
        p.m.rotation.z=Math.sin(t2*.5+p.ph)*.02;
        p.m.material.color.setHex(COLS_F[i%5]);
      });
      const sorted=[...posts].sort((a,b)=>b.score-a.score);
      setMetrics([sorted[0].score.toFixed(3),(1-posts.reduce((s,p)=>{const q=p.score;return s+(q>0?q*Math.log2(q):0)},0)/Math.log2(posts.length)).toFixed(3),(.6+Math.sin(t2*.3)*.1).toFixed(3),(posts[0].decay).toFixed(3)]);
    },
    cleanup(){posts.forEach(p=>scene.remove(p.m));posts=[];}
  }
})();

// ════════════════════════════════════════════════════════
// ⑮ VIRAL SPREAD (SIR) — Network simulation with hubs
// ════════════════════════════════════════════════════════
Viz.viral=(()=>{
  let nds=[],edg=[],t2=0;
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.6));nds=[];edg=[];
      const N=110,pos=[];
      for(let i=0;i<N;i++){
        const th=(i/N)*Math.PI*8+Math.random()*.3,r=4+Math.random()*30;
        pos.push(new THREE.Vector3(Math.cos(th)*r,(Math.random()-.5)*14,Math.sin(th)*r));
        const g=new THREE.SphereGeometry(.4+Math.random()*.3,12,12);
        const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:0x2244ff,emissive:0x001122}));
        m.position.copy(pos[i]);scene.add(m);nds.push({m,state:i<4?1:0,timer:0,conn:0});
      }
      for(let i=4;i<N;i++){
        const ntgts=new Set();const max=Math.min(4,i);
        while(ntgts.size<max){const j=Math.floor(Math.pow(Math.random(),2)*i);ntgts.add(j)}
        ntgts.forEach(j=>{
          nds[i].conn++;nds[j].conn++;
          const lp=[pos[i],pos[j]];
          const mat=new THREE.LineBasicMaterial({color:0x111133,transparent:true,opacity:.25});
          scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lp),mat));edg.push({i,j,mat})
        });
      }
      document.getElementById('pts').textContent=N;
    },
    update(dt){
      t2+=dt;
      const beta=.32,gamma=.07;
      if(Math.random()<dt*simSpeed*.9){
        nds.forEach((nd,i)=>{
          if(nd.state===1){
            nd.timer+=dt*simSpeed;
            if(nd.timer>1/gamma)nd.state=2;
            edg.forEach(({i:a,j:b})=>{const nb=a===i?b:b===i?a:-1;if(nb>=0&&nds[nb].state===0&&Math.random()<beta*dt*simSpeed*.7){nds[nb].state=1;nds[nb].timer=0}});
          }
        });
      }
      const C={S:0,I:0,R:0};
      nds.forEach(({m,state,conn})=>{
        const cols=[0x2255ff,0xff3322,0x22dd66];m.material.color.setHex(cols[state]);m.material.emissive.setHex(cols[state]);m.material.emissiveIntensity=state===1?.55+Math.sin(t2*6)*.2:.07;
        const sc=.4+Math.log1p(conn)*.22;m.scale.setScalar(sc+(state===1?Math.sin(t2*5)*.12:0));
        C[['S','I','R'][state]]++;
      });
      if(C.I===0&&C.R>nds.length*.4)nds.forEach(n=>{n.state=Math.random()<.03?1:0;n.timer=0});
      setMetrics([C.S,C.I,C.R,(beta/gamma).toFixed(2)]);
    },
    cleanup(){nds.forEach(n=>scene.remove(n.m));nds=[];edg=[];}
  }
})();

// ════════════════════════════════════════════════════════
// ⑯ RECOMMENDER — User-item embedding space + similarity clusters
// ════════════════════════════════════════════════════════
Viz.rec=(()=>{
  let users=[],items=[],arrows=[],t2=0;
  const UCOLS=[0xff6b2b,0xa066ff,0x00d4ff,0xffd60a,0x00ff9d];
  return{
    init(){
      scene.add(new THREE.AmbientLight(0xffffff,.6));
      scene.add(new THREE.PointLight(0xff6b2b,2,200)).position.set(0,20,0);
      users=[];items=[];arrows=[];
      // User clusters in latent space
      const uc=[{x:-20,z:-15,c:0},{x:15,z:-20,c:1},{x:-15,z:20,c:2},{x:20,z:18,c:3},{x:0,z:0,c:4}];
      uc.forEach((u,ui)=>{
        for(let i=0;i<12;i++){
          const dx=(Math.random()-.5)*14,dz=(Math.random()-.5)*14;
          const g=new THREE.SphereGeometry(.6,12,12);
          const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:UCOLS[ui],emissive:UCOLS[ui],emissiveIntensity:.3}));
          m.position.set(u.x+dx,.5,u.z+dz);scene.add(m);users.push({m,cluster:ui,x:u.x+dx,z:u.z+dz,ph:Math.random()*Math.PI*2});
        }
      });
      // Items scattered
      for(let i=0;i<50;i++){
        const g=new THREE.BoxGeometry(.7,.7,.7);
        const col=UCOLS[Math.floor(Math.random()*5)];
        const m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:col,transparent:true,opacity:.6}));
        const x=(Math.random()-.5)*70,z=(Math.random()-.5)*70;
        m.position.set(x,-.5,z);scene.add(m);items.push({m,x,z,ph:Math.random()*Math.PI*2});
      }
      // Recommendation arrows (nearest item per cluster)
      uc.forEach((u,ui)=>{
        const ni=items.reduce((best,item)=>{const d=(item.x-u.x)**2+(item.z-u.z)**2;return d<best.d?{item,d}:{...best}},{d:Infinity,item:null});
        if(ni.item){
          const pts=[new THREE.Vector3(u.x,2,u.z),new THREE.Vector3(ni.item.x,2,ni.item.z)];
          const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:UCOLS[ui],transparent:true,opacity:.4}));
          scene.add(l);arrows.push(l);
        }
      });
      document.getElementById('pts').textContent=users.length+items.length;
    },
    update(dt){
      t2+=dt;
      users.forEach(u=>{u.m.position.y=.5+Math.sin(t2*1.5+u.ph)*.4;u.m.material.emissiveIntensity=.2+Math.sin(t2*2+u.ph)*.15});
      items.forEach(it=>{it.m.rotation.y+=dt*.8;it.m.position.y=-.5+Math.sin(t2*2+it.ph)*.25});
      const p10=.32+Math.sin(t2*.4)*.03,r10=.24+Math.sin(t2*.3)*.02;
      setMetrics([p10.toFixed(3),r10.toFixed(3),(.7+Math.sin(t2*.5)*.06).toFixed(3),(.45+Math.sin(t2*.2)*.08).toFixed(3)]);
    },
    cleanup(){users.forEach(u=>scene.remove(u.m));items.forEach(i=>scene.remove(i.m));arrows.forEach(a=>scene.remove(a));users=[];items=[];arrows=[];}
  }
})();

// ════════════════════════════════════════════════════════
// UI MANAGEMENT
// ════════════════════════════════════════════════════════
function setMetrics(vals){vals.forEach((v,i)=>{const el=document.getElementById('m'+i);if(el)el.textContent=v})}
function buildMetricRows(labels){return labels.map((lb,i)=>`<div class="mr"><span class="ml">${lb}</span><span class="mv" id="m${i}">—</span></div>`).join('')}

function buildSidebar(){
  const sb=document.getElementById('side');sb.innerHTML='';
  const algs=ALGOS[cat]||[];
  const lbl=document.createElement('div');lbl.className='sh';lbl.textContent='// '+cat.toUpperCase();sb.appendChild(lbl);
  algs.forEach(a=>{
    const d=document.createElement('div');d.className='ai'+(a.id===curA?' act':'');
    d.style.borderLeftColor=a.id===curA?a.c:'transparent';
    d.innerHTML=`<div class="aic">${a.ic}</div><div><div class="an">${a.n}</div><div class="ac">${a.cx} · ${a.dm}</div></div>`;
    d.onclick=()=>selectAlgo(a.id);sb.appendChild(d);
  });
}

function clearScene(){
  const keep=[];scene.traverse(o=>{if(o instanceof THREE.Points&&o.geometry.attributes.position.count>1900)keep.push(o)});
  const rem=[];scene.traverse(o=>{if(o!==scene&&!keep.includes(o))rem.push(o)});rem.forEach(o=>scene.remove(o));
}

function selectAlgo(id){
  if(curA&&Viz[curA]&&curA!==id)Viz[curA].cleanup&&Viz[curA].cleanup();
  clearScene();curA=id;
  const all=Object.values(ALGOS).flat();const a=all.find(x=>x.id===id);if(!a)return;
  document.getElementById('vn').textContent=a.n.toUpperCase();
  document.getElementById('vc').textContent=cat.charAt(0).toUpperCase()+cat.slice(1)+' · '+a.dm;
  const cb=document.getElementById('cb');cb.textContent=a.cx;cb.style.color=a.c;cb.style.borderColor=a.c+'55';cb.style.background=a.c+'18';
  document.getElementById('db').textContent=a.dm.split('+')[0];
  document.getElementById('metrics').innerHTML=buildMetricRows(a.m||['V1','V2','V3','V4']);
  document.getElementById('bn1').textContent=a.t[0];
  document.getElementById('bn2').innerHTML=a.t[1].replace(/`([^`]+)`/g,'<code>$1</code>');
  document.getElementById('bn3').textContent=a.t[2];
  // Update active tab colors
  document.querySelectorAll('.nt').forEach(b=>{const isAct=b.dataset.c===cat;b.classList.toggle('act',isAct);b.style.borderBottomColor=isAct?a.c:'transparent'});
  buildSidebar();t=0;sph={r:80,t:.4,p:1.15};updateCamSph();
  if(Viz[id])Viz[id].init&&Viz[id].init();
}

function switchCat(c){
  cat=c;
  document.querySelectorAll('.nt').forEach(b=>{b.classList.toggle('act',b.dataset.c===c)});
  const a=ALGOS[c]?.[0];if(a)selectAlgo(a.id);
}

function rebuildScene(){if(Viz[curA]){Viz[curA].cleanup&&Viz[curA].cleanup();clearScene();Viz[curA].init&&Viz[curA].init()}}

// ── ANIMATION LOOP ─────────────────────────────────────
let lastT=0;
function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min((now-lastT)/1000,.05);lastT=now;t+=dt;
  fCount++;
  if(now-lastFPS>500){document.getElementById('fps').textContent=Math.round(fCount*1000/(now-lastFPS));fCount=0;lastFPS=now}
  try{Viz[curA]?.update(dt)}catch(e){}
  renderer.render(scene,camera);
}

// ── CUSTOM CURSOR ──────────────────────────────────────
const cur=document.getElementById('cursor'),ring=document.getElementById('ring');
let cx2=0,cy2=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{cx2=e.clientX;cy2=e.clientY});
(function animCursor(){
  cur.style.left=cx2+'px';cur.style.top=cy2+'px';
  rx+=(cx2-rx)*.11;ry+=(cy2-ry)*.11;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(animCursor);
})();

// ── START ──────────────────────────────────────────────
initThree();
buildSidebar();
selectAlgo('orbital');
animate(0);
</script>
